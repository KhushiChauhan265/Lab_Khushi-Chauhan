<!--WAP to make the calculator using GUI -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calculator</title>
<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#222;
  font-family:Arial;
}
.calculator{
  background:#111;
  padding:20px;
  border-radius:12px;
  width:320px;
}
#display{
  width:100%;
  height:60px;
  font-size:26px;
  margin-bottom:15px;
  text-align:right;
  padding:10px;
  border:none;
  border-radius:8px;
  box-sizing:border-box;
}
.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}
button{
  height:60px;
  font-size:20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.num{background:#333;color:#fff;}
.op{background:#ff9500;color:#fff;}
.equal{background:#28a745;color:#fff;}
.clear{background:#dc3545;color:#fff;}
</style>
</head>
<body>

<div class="calculator">
  <input type="text" id="display" readonly>

  <div class="buttons">
    <button class="clear" onclick="clr()">C</button>
    <button class="op" onclick="add('/')">÷</button>
    <button class="op" onclick="add('*')">×</button>
    <button class="op" onclick="add('-')">−</button>

    <button class="num" onclick="add('7')">7</button>
    <button class="num" onclick="add('8')">8</button>
    <button class="num" onclick="add('9')">9</button>
    <button class="op" onclick="add('+')">+</button>

    <button class="num" onclick="add('4')">4</button>
    <button class="num" onclick="add('5')">5</button>
    <button class="num" onclick="add('6')">6</button>
    <button class="equal" onclick="calc()">=</button>

    <button class="num" onclick="add('1')">1</button>
    <button class="num" onclick="add('2')">2</button>
    <button class="num" onclick="add('3')">3</button>
    <button class="num" onclick="add('.')">.</button>

    <button class="num" onclick="add('0')">0</button>
  </div>
</div>

<script>
function add(v){
  display.value+=v;
}
function clr(){
  display.value="";
}
function calc(){
  display.value=eval(display.value);
}
</script>

</body>
</html>
